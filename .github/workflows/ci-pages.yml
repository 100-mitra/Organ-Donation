# CI + demo deploy (Phase 7, D-026). Free tier only: GitHub-hosted runners on a
# public repo + GitHub Pages. The three suites gate the deploy — a red suite
# means no publish, so the live demo can never outrun the tests that pin it
# (including demo.test.js, which proves the bundled snapshot verifies).
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: pytest (engine + api + evaluation)
        run: python -m pytest engine api evaluation -q

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            contracts/package-lock.json
            web/package-lock.json
      - name: Hardhat tests (AuditLedger)
        working-directory: contracts
        run: |
          npm ci
          npx hardhat test
      - name: vitest (canon/CAS/verify lockstep + demo snapshot)
        working-directory: web
        run: |
          npm ci
          npm test

  # Deploy the static demo to GitHub Pages — only on a green main push.
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # Creates/enables the Pages site (source: GitHub Actions) if it doesn't
      # exist yet — deploy-pages does NOT, and would fail on the first run.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build demo (static, bundled snapshot, project-site base path)
        working-directory: web
        env:
          VITE_DEMO: "1"
          VITE_BASE: /Organ-Donation/
        run: |
          npm ci
          npx vite build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
      - id: deployment
        uses: actions/deploy-pages@v4
